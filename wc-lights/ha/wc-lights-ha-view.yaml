                    entity: switch.electrolux_boiler_boiler_main_power_2
                    name: Power
                    card_mod:
                      style: |
                        ha-card {
                          border: none !important;
                          box-shadow: none !important;
                          background: transparent !important;
                        }
                  - type: tile
                    entity: switch.s1_boiler_socket_1
