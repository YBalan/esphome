                          background: transparent !important;
                        }           
                  - type: tile
                    entity: sensor.jkbms_gateway_v2_bms_total_voltage_2
                    name: Batt V
                    card_mod:
                      style: |
                        ha-card {
                          border: none !important;
                          box-shadow: none !important;
                          background: transparent !important;
                        }           
                  - type: tile
                    entity: sensor.generatorpow_phase_a_voltage
                    name: Grid V
                    card_mod:
                      style: |
                        ha-card {
                          border: none !important;
                          box-shadow: none !important;
                          background: transparent !important;
                        }           
