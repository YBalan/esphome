                    name: Minutes Timer
                    icon: mdi:timer-cog-outline
                    card_mod:
                      style: |
                        ha-card {
                          border: none !important;
                          box-shadow: none !important;
                          background: transparent !important;
                        }
              - type: horizontal-stack
                cards:
                  - type: tile
                    entity: sensor.electrolux_boiler_boiler_total_energy
                    name: Energy
                    card_mod:
                      style: |
                        ha-card {
                          border: none !important;
                          box-shadow: none !important;
                          background: transparent !important;
                        }
      - type: grid
        cards:
          - type: custom:apexcharts-card
            header:
              show: true
              title: Fridge
              show_states: true
              colorize_states: true
            graph_span: 4h
            apex_config:
              tooltip:
                shared: true
                intersect: false
              xaxis:
                type: datetime
                tickAmount: 8
              grid:
                show: true
                strokeDashArray: 3
                xaxis:
                  lines:
                    show: true
            yaxis:
              - id: sensor
                decimals: 2
              - id: number
                decimals: 2
              - id: power
                decimals: 0
                opposite: true
              - id: door_axis
                show: false
                min: 0
                max: 1
            series:
              - entity: sensor.refrigerator_fridge_temperature
                yaxis_id: sensor
                name: Current
                stroke_width: 5
                fill_raw: last
              - entity: number.refrigerator_fridge_temperature
                yaxis_id: sensor
                name: Settings
                stroke_width: 1
                fill_raw: last
              - entity: sensor.refrigerator_power
                yaxis_id: power
                name: Power
                type: area
                stroke_width: 1
                fill_raw: last
                show:
                  extremas: true
              - entity: sensor.refrigerator_run_duration
                name: Power Time
                color: '#3498db'
                show:
                  in_chart: false
                group_by:
                  func: last
                  duration: 1m
                  fill: last
              - entity: sensor.refrigerator_rest_duration
                name: Rest Time
                color: '#2ecc71'
                show:
                  in_chart: false
                group_by:
                  func: last
                  duration: 1m
                  fill: last
              - entity: binary_sensor.refrigerator_fridge_door
                yaxis_id: door_axis
                name: Door
                type: column
                color: '#ffeb3b'
                stroke_width: 3
                transform: 'return x === ''on'' ? 1 : 0;'
                show:
                  legend_value: false
                  in_header: false
                  in_legend: true
    icon: mdi:chart-donut-variant
    cards: []
    badges:
      - type: entity
        show_name: true
        show_state: true
        show_icon: true
        entity: sensor.refrigerator_power
        name: Fridge
        show_entity_picture: false
        state_content:
          - state
          - last_changed
        icon: mdi:fridge
      - type: entity
        show_name: true
        show_state: true
        show_icon: true
        entity: binary_sensor.main_grid_power_status_2
        name: Grid
        state_content: last_changed_stable
        visibility:
          - condition: state
            entity: binary_sensor.main_grid_power_status
            state: 'off'
      - type: entity
        show_name: true
        show_state: true
        show_icon: true
        entity: sensor.zmai_90_ups_current
        name: ZMAi
      - type: entity
        show_name: true
        show_state: true
        show_icon: true
        entity: sensor.zmai_90_ups_voltage
        name: ZMAi
    header:
      layout: center
      badges_position: bottom
      badges_wrap: scroll
