  - type: sections
    max_columns: 1
    title: Alerts
    path: alerts
    icon: mdi:alarm-light
    sections:
      - type: grid
        grid_options:
          columns: 12
        cards:
          - type: custom:stack-in-card
            grid_options:
              columns: 12
            cards:
              - type: tile
                entity: binary_sensor.group_regions_alert_monitor
                name: NATIONAL STATUS
                vertical: true
                state_content:
                  - alert_count
                  - regions_at_risk
                  - state
                  - last_changed
                card_mod:
                  style: |
                    ha-card {
                      --tile-icon-size: 80px !important; /* HUGE ICON */
                      background: {% if is_state('binary_sensor.group_regions_alert_monitor', 'on') %} rgba(255, 0, 0, 0.2) {% else %} rgba(0, 255, 0, 0.05) {% endif %};
                      border: 1px solid rgba(255,255,255,0.1);
                      padding: 20px 0;
                    }
                    .icon-container {
                      width: 100px !important;
                      height: 100px !important;
                      margin-bottom: 15px !important;
                    }
                    /* MAKE TEXT BIG AND BOLD */
                    .primary {
                      font-size: 1.5em !important;
                      font-weight: 900 !important;
                      text-transform: uppercase;
                    }
                    .secondary {
                      font-size: 1.2em !important;
                      color: white !important;
                      opacity: 1 !important;
                      font-weight: 500 !important;
                      line-height: 1.4;
                    }
          - type: custom:stack-in-card
            grid_options:
              columns: 6
            cards:
              - type: tile
                entity: binary_sensor.air_alert_monitor
                name: ODESA
                vertical: true
                show_entity_picture: true
                state_content:
                  - region_name
                  - active_alerts
                  - last_changed
                  - state
                card_mod:
                  style: >
                    ha-card {
                      --tile-icon-size: 60px !important;
                      background: transparent;
                      border: none;
                    }

                    .primary { font-weight: 900 !important; font-size: 1.3em
                    !important; }

                    .secondary { 
                      font-size: 1.1em !important; 
                      color: #ff4444 !important; /* Emergency Red */
                      opacity: 1 !important; 
                    }
              - type: tile
                entity: switch.sonoff_aca8000bf2_1
                name: SIREN
                icon: mdi:alarm-light
                color: red
                card_mod:
                  style: |
                    ha-card {
                      background: rgba(255, 255, 255, 0.1);
                      margin: 10px;
                      border-radius: 12px;
                    }
          - type: custom:stack-in-card
            grid_options:
              columns: 6
            cards:
              - type: tile
                entity: binary_sensor.massive_attack_alert
                name: MASSIVE
                vertical: true
                state_content:
                  - total_regions
                  - alert_threshold
                  - last_changed
                card_mod:
                  style: >
                    ha-card {
                      --tile-icon-size: 60px !important;
                      background: transparent;
