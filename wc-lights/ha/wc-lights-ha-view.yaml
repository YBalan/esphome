                  - type: tile
                    entity: sensor.electrolux_boiler_boiler_clock
                    name: Clock
                    card_mod:
                      style: |
                        ha-card {
                          border: none !important;
                          box-shadow: none !important;
                          background: transparent !important;
                        }
                  - type: tile
                    entity: number.electrolux_boiler_boiler_timer_start_hour
                    name: Hours Timer
                    icon: mdi:hours-24
                    card_mod:
                      style: |
                        ha-card {
                          border: none !important;
                          box-shadow: none !important;
                          background: transparent !important;
                        }
                  - type: tile
