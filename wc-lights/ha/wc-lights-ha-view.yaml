                    card_mod:
                      style: |
                        ha-card {
                          border: none !important;
                          box-shadow: none !important;
                          background: transparent !important;
                        }
                  - type: tile
                    entity: light.electrolux_boiler_lcd_display_switch_2
                    name: LCD
                    card_mod:
                      style: |
                        ha-card {
                          border: none !important;
                          box-shadow: none !important;
                          background: transparent !important;
                        }
              - type: horizontal-stack
