substitutions:
  # Device
  device_name: electrolux-boiler

  # Hardware pins
  uart_tx_pin: GPIO17      # Boiler RX line (1.7 V) — White/Blue, USB-
  uart_rx_pin: GPIO16      # Boiler TX line (5.0 V) — Green, USB+
  led_pin: GPIO2           # Onboard blue LED

  # UART
  uart_baud_rate: "9600"
  uart_packet_size: "13"   # Expected RX packet length in bytes

  # WiFi AP fallback
  ap_ssid: "AP-Boiler"
  ap_password: "password"

  # MQTT
  mqtt_client_id: esp32_electrolux_boiler_client
  mqtt_topic_prefix: boiler
  mqtt_port: "1883"

  # Timezone
  timezone: "Europe/Kyiv"

  # Boiler defaults
  default_target_temp: "70"   # °C — initial target temperature
  default_power_level: "2"    # 1=700 W, 2=1300 W, 3=2000 W

  # Temperature slider limits
  temp_min: "35"   # °C
  temp_max: "75"   # °C

  # Timing
  blink_duration: 700ms    # LED pulse length on packet receive
  wifi_rssi_interval: 30s  # How often WiFi signal strength is sampled
  clock_sync_interval: 24h # How often the boiler clock is re-synced to NTP
  energy_interval: 30s     # Energy accumulation cadence — should match boiler update rate (~30 s)

  # Timer defaults — scheduled clock time (HH:MM) at which the boiler will begin heating
  default_timer_hours: "23"   # Start hour (0–23)
  default_timer_minutes: "0"  # Start minute (0, 5, 10 … 55)
  
esphome:
  name: ${device_name}
  includes:
    - electrolux-boiler-defines.h
    - electrolux-boiler.h
  on_boot:    
    - priority: 800
      then:
        - logger.log: "ON_BOOT IS WORKING"
        
esp32:
  board: esp32dev
  framework:
    type: esp-idf  #arduino #esp-idf 
      
ota:
  - platform: esphome
  
time:
  - platform: sntp
    id: sntp_time
    timezone: ${timezone}

# 1. Connection settings
wifi:
  #ssid: !secret wifi_ssid
  #password: !secret wifi_password
  # Fallback access point if WiFi disappears
  ap:
    ssid: ${ap_ssid}
    password: ${ap_password}
    
  # Allow saving new credentials to flash memory
  fast_connect: true

# Enables the web interface when in AP mode
captive_portal:

# Simple web server to change settings if already connected
web_server:
  port: 80

api: #For Home Assistant

# MQTT configuration
mqtt:    
  broker: !secret mqtt_broker
  client_id: ${mqtt_client_id}
  username: !secret mqtt_username
  password: !secret mqtt_password  
  port: ${mqtt_port}
  topic_prefix: ${mqtt_topic_prefix}
  reboot_timeout: 0s
  # Discovery allows Home Assistant to find the device automatically via MQTT
  discovery: true

globals:
  - id: global_boiler_power_on
    type: bool
    initial_value: 'true'
  - id: global_boiler_target_temp
    type: int
    initial_value: '${default_target_temp}'
  - id: global_boiler_power_level
    type: int
    initial_value: '${default_power_level}' # 1=700, 2=1300, 3=2000
  - id: global_timer_hours
    type: int
    initial_value: '${default_timer_hours}'
  - id: global_timer_minutes
    type: int
    initial_value: '${default_timer_minutes}'
  # Accumulated energy in Wh; restored across reboots so the total is never lost.
  - id: global_total_energy_wh
    type: float
    restore_value: true
    initial_value: '0.0'

logger:
  level: INFO
  baud_rate: 0

# --- THE REST OF YOUR BOILER CONFIG ---
uart:  
  id: heatuart
  tx_pin: ${uart_tx_pin}
  rx_pin: ${uart_rx_pin}
  baud_rate: ${uart_baud_rate}
  debug:
    direction: RX
    dummy_receiver: true 
    after:
      bytes: ${uart_packet_size}
    sequence:
      - lambda: |-
          boiler_parse_rx_packet(direction, bytes);

sensor:
  - platform: template
    name: "Boiler Current Temp"
    id: current_temp
    unit_of_measurement: "°C"
    device_class: temperature
  - platform: template
    name: "Boiler Target Temp"
    id: target_temp
    unit_of_measurement: "°C"
    device_class: temperature
  - platform: wifi_signal
    name: "WiFi Signal Sensor"
    id: wifi_rssi
    update_interval: ${wifi_rssi_interval}
    state_topic: "boiler/wifi_rssi"

  # Current power draw in W — 0 when not heating, nominal element power when heating.
  - platform: template
    name: "Boiler Power"
    id: boiler_power_w
    unit_of_measurement: "W"
    device_class: power
    state_class: measurement
    accuracy_decimals: 0
    lambda: "return id(is_heating).state ? (float)boiler_get_power_watts() : 0.0f;"

  # Total energy consumed — state_class: total_increasing lets HA use this in the Energy dashboard.
  - platform: template
    name: "Boiler Total Energy"
    id: boiler_total_energy
    unit_of_measurement: "kWh"
    device_class: energy
    state_class: total_increasing
    accuracy_decimals: 3
    lambda: "return id(global_total_energy_wh) / 1000.0f;"

binary_sensor:
  - platform: template
    name: "Boiler Heating"
    id: is_heating
    device_class: heat
  - platform: template
    name: "Boiler BST Mode"
    id: bst_active
    icon: "mdi:bacteria-outline"
  # 1. Internal status sensor (ON when connected to WiFi/MQTT, OFF otherwise)
  - platform: status    
    id: online_status
    on_state:
      then:
        - if:
            condition:
              binary_sensor.is_off: online_status
            then:
              - output.turn_on: blue_led 
            else:
              - output.turn_off: blue_led

text_sensor:
  - platform: template
    name: "Boiler Temp Trend"
    id: temp_trend
    icon: "mdi:thermometer-chevron-up"
  
  - platform: template
    name: "Boiler Power Mode"
    id: power_str
  
  - platform: template
    internal: true
    name: "Boiler Raw Packet Dec"
    id: raw_packet_history
    icon: "mdi:file-code-outline"
    
  - platform: template
    name: "Boiler Clock"
    id: boiler_clock
    icon: "mdi:clock-outline"
  
  - platform: template
    name: "Boiler Timer Start Time"
    id: timer_human
    icon: "mdi:timer-sand"

button:  
  - platform: template
    name: "Sync Boiler Clock"
    id: sync_clock_btn
    icon: "mdi:clock-sync"
    on_press:
      then:
        - script.execute: sync_boiler_time
  - platform: template
    name: "Run Boiler Timer"
    id: set_timer_btn
    icon: "mdi:timer-play-outline"
    on_press:
      then:
        - script.execute: send_boiler_timer
    # WiFi Reset Button
  - platform: factory_reset
    name: "Reset Device WiFi"
    id: reset_wifi_btn
    icon: "mdi:wifi-reset"
    
interval:  
  - interval: ${clock_sync_interval}
    then:
      - script.execute: sync_boiler_time

  # Accumulate energy every energy_interval when the boiler is actively heating.
  - interval: ${energy_interval}
    then:
      - lambda: |-
          if (id(is_heating).state) {
            // Wh added = power_W × (interval_s / 3600)
            id(global_total_energy_wh) += boiler_get_power_watts() * (30.0f / 3600.0f);
          }
          id(boiler_power_w).publish_state(id(is_heating).state ? (float)boiler_get_power_watts() : 0.0f);
          id(boiler_total_energy).publish_state(id(global_total_energy_wh) / 1000.0f);

output:
  - platform: gpio
    pin: ${led_pin}
    id: blue_led

# 1. Power switch (On/Off)
switch:
  - platform: template
    name: "Boiler Main Power"
    id: boiler_switch
    icon: "mdi:power"
    lambda: "return id(global_boiler_power_on);"
    optimistic: true
    turn_on_action:
      - globals.set:
          id: global_boiler_power_on
          value: 'true'
      - script.execute: send_boiler_command
    turn_off_action:
      - globals.set:
          id: global_boiler_power_on
          value: 'false'
      - script.execute: send_boiler_command
      
  - platform: template
    name: "Boiler BST Mode"
    id: bst_switch
    icon: "mdi:bacteria"
    optimistic: true    
    lambda: |-
      return id(bst_active).state;
    turn_on_action:
      - uart.write: !lambda |-
          return boiler_build_bst_packet(true);
      - logger.log: "MQTT/HA: BST Turned ON"    
    turn_off_action:
      - uart.write: !lambda |-
          return boiler_build_bst_packet(false);
      - logger.log: "MQTT/HA: BST Turned OFF"

# 2. Power Selector (700/1300/2000/No Frost/Timer)
select:
  - platform: template
    id: boiler_mode_switch
    name: "Boiler Power Mode Set"
    options:
      - "700W (Low)"
      - "1300W (Medium)"
      - "2000W (High)"
      - "Timer"
      - "No Frost 5°C"      
    initial_option: "1300W (Medium)"
    optimistic: true
    set_action:
      - lambda: |-
          if (x == "Timer") {
            id(send_boiler_timer).execute();            
          } else {
            boiler_set_power_level(x);
            id(send_boiler_command).execute();
          }

# 3. Temperature slider
number:
  - platform: template
    name: "Boiler Target Temp Set"
    id: boiler_target_temp_set
    min_value: ${temp_min}
    max_value: ${temp_max}
    step: 1
    unit_of_measurement: "°C"
    mode: slider
    #optimistic: true
    lambda: "return id(global_boiler_target_temp);"
    set_action:
      - globals.set:
          id: global_boiler_target_temp
          value: !lambda "return (int)x;"
      - script.execute: send_boiler_command

  # Scheduled start hour: the clock hour (0–23) at which the boiler will begin heating.
  # The boiler fires at this time according to its internal clock (set via Sync Boiler Clock).
  - platform: template
    name: "Boiler Timer Start Hour"
    id: boiler_timer_hours_set
    min_value: 0
    max_value: 23
    step: 1
    unit_of_measurement: "h"
    mode: box
    #optimistic: true
    lambda: "return id(global_timer_hours);"
    set_action:
      - globals.set:
          id: global_timer_hours
          value: !lambda "return (int)x;"

  # Scheduled start minute: clock minute (0–55, step 5) at which the boiler will begin heating.
  - platform: template
    name: "Boiler Timer Start Minute"
    id: boiler_timer_minutes_set
    min_value: 0
    max_value: 55
    step: 5
    unit_of_measurement: "min"
    mode: box
    #optimistic: true
    lambda: "return id(global_timer_minutes);"
    set_action:
      - globals.set:
          id: global_timer_minutes
          value: !lambda "return (int)x;"

script:
  - id: blink_led_script
    mode: restart
    then:
      - output.turn_on: blue_led
      - delay: ${blink_duration}
      - output.turn_off: blue_led
      - if:
          condition:
            binary_sensor.is_on: online_status
          then:
            - output.turn_off: blue_led
  - id: send_boiler_command
    then:
      - uart.write: !lambda |-
          return boiler_build_tx_packet();
  - id: sync_boiler_time
    then:
      - uart.write: !lambda |-
          return boiler_build_clock_packet();
  - id: send_boiler_timer
    then:
      # Sync clock first so the boiler knows the current time before the timer is armed.
      - script.execute: sync_boiler_time
      - delay: 200ms
      - uart.write: !lambda |-
          return boiler_build_timer_packet();
      # Request state immediately to confirm the boiler accepted and entered timer mode (state=4).
      #- delay: 200ms
      #- uart.write: !lambda |-
          #return boiler_build_state_request();
 
text:
  - platform: template
    name: "Boiler Raw Command"
    id: raw_cmd_input
    mode: text
    optimistic: true
    set_action:
      then:
        - uart.write: !lambda |-
            return boiler_build_raw_payload(x);