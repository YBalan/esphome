substitutions:
  # Device name
  device_name: jbdbms-gateway-v2
  
  # Hardware
  # IMPORTANT: Make sure to use your JBD BMS MAC address here
  bms_mac_address: "A5:C2:37:05:69:89" 
  relay_control_pin: "14"
  
  # Timings
  display_on_time: "30s"
  bms_update_interval: "5s"
  
  # Relay limits (in Ah)
  total_capacity: "200.0"
  soc_low_limit: "160.0"
  soc_high_limit: "195.0"

esphome:
  name: ${device_name}
  # Start the timer when the system boots
  on_boot:
    priority: -100 
    then:
      - script.execute: display_timer

esp32:
  board: esp32dev
  framework:
    type: esp-idf # Stable for BLE + WiFi coexistence
    
ota:
  - platform: esphome

# 1. Connection settings
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  # Fallback access point if WiFi disappears
  ap:
    ssid: "JBDBMS-Gateway-Hotspot"  

# MQTT configuration
mqtt:    
  broker: !secret mqtt_broker
  username: !secret mqtt_username
  password: !secret mqtt_password  
  port: 1883
  topic_prefix: jbdbms # Changed prefix for JBD
  reboot_timeout: 0s
  discovery: true

# Enable logger
logger:
  level: INFO

# 2. Bluetooth settings
esp32_ble_tracker:
  scan_parameters:
    active: true

ble_client:
  - mac_address: ${bms_mac_address}
    id: jbd_bms_ble_client

# 3. JBD-BMS (XiaoXiang) driver integration
external_components:
  - source: github://syssi/esphome-jbd-bms@main

jbd_bms_ble:
  - ble_client_id: jbd_bms_ble_client
    id: my_bms
    update_interval: ${bms_update_interval} 

# 4. SENSORS (Telemetry)
sensor:
  - platform: jbd_bms_ble
    jbd_bms_ble_id: my_bms

    # Total voltage
    total_voltage:
      name: "JBD Total Voltage"
      state_topic: "jbdbms/voltage"
      id: bms_v
      filters:
        - delta: 0.05
        - throttle: 2s

    # Current
    current:
      name: "JBD Current"
      state_topic: "jbdbms/current"
      id: bms_a
      filters:
        - delta: 0.1
        - throttle: 2s

    # Charge in Ah (Remaining Capacity)
    capacity_remaining:
      name: "JBD SoC Ah"
      state_topic: "jbdbms/soc"
      id: bms_ah
      on_value:
        then:
          # If the capacity dropped below limit
          - if:
              condition:
                lambda: 'return x < ${soc_low_limit};'
              then:
                - switch.turn_on: bms_relay                
          # If the capacity rose above limit
          - if:
              condition:
                lambda: 'return x >= ${soc_high_limit};'
              then:
                - switch.turn_off: bms_relay                
      filters:
        - delta: 0.01
        - throttle: 2s
        
    # Remaining capacity in percentage (%)
    state_of_charge:
      name: "JBD SoC Percentage"
      id: bms_soc_pct
      state_topic: "jbdbms/soc_percent"
      unit_of_measurement: "%"
      device_class: battery
      accuracy_decimals: 0
      filters:
        - delta: 1
        - throttle: 2s
        
    # Power (W)
    power:
      name: "JBD Power"
      state_topic: "jbdbms/power"
      id: bms_power
      filters:
        - delta: 5.0
        - throttle: 2s

    # JBD Temperature sensors (NTC1, NTC2)
    temperature_1:
      name: "JBD Temp 1"
      state_topic: "jbdbms/t1"
      filters: &temp_filter
        - delta: 0.5
        - throttle: 15s
    temperature_2:
      name: "JBD Temp 2"
      state_topic: "jbdbms/t2"
      filters: *temp_filter  

    # JBD Charging Cycles
    charging_cycles:
      name: "JBD Charging Cycles"      
      state_topic: "jbdbms/cycles"            
      filters:
        - delta: 1
        - throttle: 60s

    # Cell voltages (Min/Max)
    min_cell_voltage:
      name: "JBD Min Cell"
      state_topic: "jbdbms/min_c_v"
      filters:
        - delta: 0.01
        - throttle: 5s
        
    max_cell_voltage:
      name: "JBD Max Cell"
      state_topic: "jbdbms/max_c_v"
      filters:
        - delta: 0.01
        - throttle: 5s
        
    # Imbalance (Delta)
    delta_cell_voltage:
      name: "JBD Cell Delta"
      state_topic: "jbdbms/delta"
      filters:
        - delta: 0.002
        - throttle: 5s

  # Wi-Fi signal level
  - platform: wifi_signal
    name: "JBD WiFi Signal RSSI"
    id: wifi_rssi
    update_interval: 15s
    state_topic: "jbdbms/wifi_rssi"
    force_update: true

  # Bluetooth (BLE) signal level
  - platform: ble_rssi
    mac_address: ${bms_mac_address}
    name: "JBD BLE RSSI"
    id: ble_rssi_val    
    state_topic: "jbdbms/ble_rssi"
    force_update: true
    filters:
      - throttle: 15s
      
  # Charging Time Remaining Calculation
  - platform: template
    name: "JBD Charging Time Remaining"
    id: charging_time
    unit_of_measurement: "h"
    state_topic: "jbdbms/charging_time_hours"
    accuracy_decimals: 1
    update_interval: 10s
    lambda: |-
      float current = id(bms_a).state;
      float total_cap = ${total_capacity};
      float remaining_cap = id(bms_ah).state;
      if (current > 0.1) {
        float need_ah = total_cap - remaining_cap;
        if (need_ah <= 0) return 0;
        return need_ah / current;
      } else {
        return 0;
      }
      
   # Split: Positive values for Charging
  - platform: template
    name: "JBD Power Charging"
    id: power_in
    unit_of_measurement: "W"
    device_class: power
    state_class: measurement
    accuracy_decimals: 1
    lambda: |-
      if (id(bms_power).state > 0) {
        return id(bms_power).state;
      } else {
        return 0;
      }

  # Split: Absolute values for Discharging
  - platform: template
    name: "JBD Power Discharging"
    id: power_out
    unit_of_measurement: "W"
    device_class: power
    state_class: measurement
    accuracy_decimals: 1
    lambda: |-
      if (id(bms_power).state < 0) {
        return id(bms_power).state * -1.0;
      } else {
        return 0;
      }
   # Total Energy Charged (kWh)
  - platform: integration
    name: "JBD Battery Energy In"
    sensor: power_in
    time_unit: h
    unit_of_measurement: "kWh"
    device_class: energy
    state_class: total_increasing    
    accuracy_decimals: 3
    state_topic: "jbdbms/energy_in"
    filters:
      # Divide by 1000 to convert Wh to kWh
      - multiply: 0.001

  # Total Energy Discharged (kWh)
  - platform: integration
    name: "JBD Battery Energy Out"
    sensor: power_out
    time_unit: h
    unit_of_measurement: "kWh"
    device_class: energy
    state_class: total_increasing    
    accuracy_decimals: 3
    state_topic: "jbdbms/energy_out"
    filters:
      # Divide by 1000 to convert Wh to kWh
      - multiply: 0.001
            
# 5. STATUSES (Binary Sensors)
binary_sensor:
  - platform: jbd_bms_ble
    jbd_bms_ble_id: my_bms
    # JBD specific status bits
    charging:
      name: "JBD Charging State"
      state_topic: "jbdbms/status/charging"
    discharging:
      name: "JBD Discharging State"
      state_topic: "jbdbms/status/discharging"
    balancing:
      name: "JBD Balancing State"
      state_topic: "jbdbms/status/balancing"
      
  # Physical BOOT button to wake display
  - platform: gpio
    pin:
      number: 0
      inverted: true
      mode: INPUT_PULLUP
    id: boot_button
    on_press:
      - script.execute: display_timer

# 6. CONTROL (Switches)
switch:
  # Physical relay on pin 14
  - platform: gpio
    pin: ${relay_control_pin}
    name: "JBD Control Relay"
    id: bms_relay
    restore_mode: ALWAYS_OFF
    state_topic: "jbdbms/relay/state"
    command_topic: "jbdbms/relay/set"    
    on_turn_on:
      - output.turn_on: blue_led_out
    on_turn_off:
      - output.turn_off: blue_led_out
    
  # JBD Internal MOSFET Switches
  - platform: jbd_bms_ble
    jbd_bms_ble_id: my_bms
    charging:
      name: "JBD Charging Switch"
      state_topic: "jbdbms/switch/charge/state"
      command_topic: "jbdbms/switch/charge/set"
    discharging:
      name: "JBD Discharging Switch"
      state_topic: "jbdbms/switch/discharge/state"
      command_topic: "jbdbms/switch/discharge/set"

# Internal Blue LED
output:
  - platform: gpio
    pin: 2
    id: blue_led_out

# 7. DIAGNOSTICS (Text Sensors)
text_sensor:
  - platform: jbd_bms_ble
    jbd_bms_ble_id: my_bms
    errors:
      name: "JBD Errors"
      state_topic: "jbdbms/errors"

  - platform: template
    name: "JBD Charging Time Formatted"
    state_topic: "jbdbms/charging_time_human"
    update_interval: 10s
    lambda: |-
      float hours_raw = id(charging_time).state;
      if (hours_raw <= 0) return {"NA"};
      int total_minutes = (int)(hours_raw * 60);
      int h = total_minutes / 60;
      int m = total_minutes % 60;
      char buf[20];
      sprintf(buf, "%dh %dm", h, m);
      return {buf};
      
# Timer script for OLED
script:
  - id: display_timer
    mode: restart
    then:
      - lambda: 'id(my_display).turn_on();'
      - delay: ${display_on_time}
      - lambda: 'id(my_display).turn_off();'

font:
  - file: "gfonts://Roboto"
    id: font_small
    size: 12
  - file: "gfonts://Roboto"
    id: font_large
    size: 22

i2c:
  sda: 21
  scl: 22
  scan: true 

# OLED Display Configuration
display:
  - platform: ssd1306_i2c
    id: my_display
    model: "SSD1306 128x64"
    address: 0x3C
    setup_priority: -100 
    lambda: |-
      it.printf(0, 0, id(font_small), "JBD-BMS MONITOR");
      it.line(0, 13, 128, 13);
      if (id(bms_v).has_state()) {
        it.printf(0, 15, id(font_large), "%.2f V", id(bms_v).state);
      }
      if (id(bms_a).has_state()) {
        it.printf(0, 38, id(font_small), "Current: %.2f A", id(bms_a).state);
      }
      if (id(bms_ah).has_state()) {
        it.printf(0, 50, id(font_small), "Cap: %.1f Ah", id(bms_ah).state);
      }