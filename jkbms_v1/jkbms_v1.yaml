substitutions:
  # Название устройства
  device_name: jkbms-gateway-v1
  
  # Железо
  bms_mac_address: "C8:47:80:28:71:3E"  
  
  # Тайминги  
  bms_update_interval: "5s" 
  

esphome:
  name: ${device_name}

esp32:
  board: esp32dev
  framework:
    type: esp-idf #arduino

# 1. Настройки подключения
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  # Резервная точка доступа, если WiFi пропадет
  ap:
    ssid: "JKBMS-Gateway-Hotspot"  

# Настройка MQTT (подставьте данные вашего брокера) #"e802d131.ala.eu-central-1.emqxsl.com"
mqtt:    
  broker: !secret mqtt_broker
  username: !secret mqtt_username
  password: !secret mqtt_password  
  #client_id: "ybalan19@gmail.com"
  port: 1883
  topic_prefix: jkbms
  #level: NONE
  #reboot_timeout: 0s
  #keepalive: 60s
  # Если используете HiveMQ Cloud (порт 8883), добавьте: certificate_authority: ...

# Включаем логгер
logger:
  level: INFO

# 2. Bluetooth настройки
esp32_ble_tracker:
  scan_parameters:
    active: true

ble_client:
  - mac_address: ${bms_mac_address}  # ЗАМЕНИТЕ НА ВАШ MAC
    id: jkbms_ble

# 3. Подключение драйвера JK-BMS
external_components:
  - source: github://syssi/esphome-jk-bms@main

jk_bms_ble:
  - ble_client_id: jkbms_ble
    id: my_bms
    update_interval: ${bms_update_interval}  
    protocol_version: JK02_32S

# 4. СЕНСОРЫ (Телеметрия)
sensor:
  - platform: jk_bms_ble
    jk_bms_ble_id: my_bms

    # Общее напряжение: шлем если изменилось на 0.05В, но не чаще раза в 2 сек
    total_voltage:
      name: "BMS Total Voltage"
      state_topic: "jkbms/voltage"
      filters:
        - delta: 0.05
        - throttle: 2s

    # Ток: шлем если изменилось на 0.1А
    current:
      name: "BMS Current"
      state_topic: "jkbms/current"
      filters:
        - delta: 0.1
        - throttle: 2s

    # Заряд в %: шлем только если изменился на 1% или раз в 30 секунд
    capacity_remaining:
      name: "BMS SoC"
      state_topic: "jkbms/soc"
      filters:
        - delta: 1.0
        - throttle: 30s

    # Мощность (Вт)
    power:
      name: "BMS Power"
      state_topic: "jkbms/power"
      filters:
        - delta: 5.0
        - throttle: 2s

    # Температуры: шлем если изменились на 0.5 градуса или раз в минуту
    temperature_sensor_1:
      name: "BMS Temp 1"
      state_topic: "jkbms/t1"
      filters: &temp_filter
        - delta: 0.5
        - throttle: 60s
    temperature_sensor_2:
      name: "BMS Temp 2"
      state_topic: "jkbms/t2"
      filters: *temp_filter    

    # Ячейки: самое важное. Шлем если изменилось на 0.01В
    # Здесь пример для 8 ячеек. Если у вас 16 — просто добавьте по аналогии.
    min_cell_voltage:
      name: "Min Cell"
      state_topic: "jkbms/min_c_v"
      filters:
        - delta: 0.01
        - throttle: 5s
        
    max_cell_voltage:
      name: "Max Cell"
      state_topic: "jkbms/max_c_v"
      filters:
        - delta: 0.01
        - throttle: 5s

    # Разбаланс (Delta)
    delta_cell_voltage:
      name: "BMS Cell Delta"
      state_topic: "jkbms/delta"
      filters:
        - delta: 0.002
        - throttle: 10s

# 5. СТАТУСЫ (Binary Sensors)
binary_sensor:
  - platform: jk_bms_ble
    jk_bms_ble_id: my_bms
    charging:
      name: "BMS Charging State"
      state_topic: "jkbms/status/charging"
    discharging:
      name: "BMS Discharging State"
      state_topic: "jkbms/status/discharging"
    balancing:
      name: "BMS Balancing State"
      state_topic: "jkbms/status/balancing"

# 6. УПРАВЛЕНИЕ (Выключатели)
# Позволяют включать/выключать заряд/разряд через MQTT
switch:
  - platform: jk_bms_ble
    jk_bms_ble_id: my_bms
    charging:
      name: "BMS Charging Switch"
      state_topic: "jkbms/switch/charge/state"
      command_topic: "jkbms/switch/charge/set"
    discharging:
      name: "BMS Discharging Switch"
      state_topic: "jkbms/switch/discharge/state"
      command_topic: "jkbms/switch/discharge/set"
    balancer:
      name: "BMS Balancer Switch"
      state_topic: "jkbms/switch/balance/state"
      command_topic: "jkbms/switch/balance/set"

# 7. ДИАГНОСТИКА
text_sensor:
  - platform: jk_bms_ble
    jk_bms_ble_id: my_bms
    errors:
      name: "BMS Errors"
      state_topic: "jkbms/errors"