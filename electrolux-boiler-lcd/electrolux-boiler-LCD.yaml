substitutions:
  # Device name
  device_name: electrolux-boiler-lcd

esphome:
  name: ${device_name}  

esp32:
  board: esp32dev # Standard for LilyGO T-Display
  framework:
    type: esp-idf
    
logger:
  level: INFO  

# Display Backlight PWM setup (GPIO4 controls the screen brightness)
output:
  - platform: ledc
    pin: GPIO4
    id: backlight_pwm

# Treat backlight as a dimmable light for Home Assistant/MQTT control
light:
  - platform: monochromatic
    output: backlight_pwm
    name: "Display Brightness"
    id: display_backlight
    restore_mode: ALWAYS_ON
    default_transition_length: 300ms

ota:
  - platform: esphome

# 1. Connection settings
wifi:
  #ssid: !secret wifi_ssid
  #password: !secret wifi_password
  # Fallback access point if WiFi disappears
  ap:
    ssid: "AP-Boiler-LCD"
    password: "password"
    
  # Allow saving new credentials to flash memory
  fast_connect: true

# Enables the web interface when in AP mode
captive_portal:

# Simple web server to change settings if already connected
web_server:
  port: 80

api: #For Home Assistant

# MQTT configuration
mqtt:    
  broker: !secret mqtt_broker
  client_id: esp32_electrolux_boiler_lcd_client
  username: !secret mqtt_username
  password: !secret mqtt_password  
  port: 1883
  topic_prefix: boiler 
  reboot_timeout: 0s
  # Discovery allows Home Assistant to find the device automatically via MQTT
  discovery: true

# Fonts from Google Fonts (No local files needed)
font:
  - file: "gfonts://Roboto"
    id: font_small
    size: 14
  - file: "gfonts://Roboto"
    id: font_medium
    size: 20
  - file: "gfonts://Roboto"
    id: font_huge
    size: 50

# Variables for internal logic
globals:
  - id: current_brightness_val
    type: float
    initial_value: '0.7'

# SUBSCRIBING TO BOILER DATA
# We use text_sensor to grab the raw strings from MQTT
text_sensor:
  - platform: mqtt_subscribe
    id: mqtt_raw_temp
    topic: "boiler/sensor/boiler_current_temp/state"
    on_value:
      then:
        - script.execute: wake_screen_script

  - platform: mqtt_subscribe
    id: mqtt_raw_target
    topic: "boiler/sensor/boiler_target_temp/state"

  - platform: mqtt_subscribe
    id: mqtt_raw_uptime
    topic: "boiler/text_sensor/boiler_uptime_human/state"

  - platform: mqtt_subscribe
    id: mqtt_raw_heating
    topic: "boiler/binary_sensor/boiler_heating/state"

# Converting strings to usable numeric sensors for the UI
sensor:
  - platform: template
    id: current_temp
    unit_of_measurement: "°C"
    lambda: 'return atof(id(mqtt_raw_temp).state.c_str());'

  - platform: template
    id: target_temp
    unit_of_measurement: "°C"
    lambda: 'return atof(id(mqtt_raw_target).state.c_str());'

binary_sensor:
  # Heating logic (Checks if MQTT string is "ON")
  - platform: template
    id: is_heating
    lambda: 'return id(mqtt_raw_heating).state == "ON";'

  # Physical Buttons
  - platform: gpio
    pin: { number: 0, inverted: true }
    name: "Brightness Button"
    on_press:
      then:
        - script.execute: cycle_brightness_script
        - script.execute: wake_screen_script

  - platform: gpio
    pin: { number: 35, inverted: true }
    name: "Wake Button"
    on_press:
      then:
        - script.execute: wake_screen_script

script:
  # Wake logic: turn on backlight for 60 seconds
  - id: wake_screen_script
    mode: restart
    then:
      - light.turn_on:
          id: display_backlight
          brightness: !lambda "return id(current_brightness_val);"
      - delay: 60s
      - light.turn_off: display_backlight

  # Cycle brightness: 25% -> 50% -> 75% -> 100%
  - id: cycle_brightness_script
    then:
      - lambda: |-
          if (id(current_brightness_val) < 0.4) id(current_brightness_val) = 0.5;
          else if (id(current_brightness_val) < 0.7) id(current_brightness_val) = 0.75;
          else if (id(current_brightness_val) < 0.9) id(current_brightness_val) = 1.0;
          else id(current_brightness_val) = 0.25;

# SPI & Display Config for ST7789 LilyGO T-Display
spi:
  clk_pin: 18
  mosi_pin: 19

display:
  - platform: st7789v
    model: Custom
    height: 135
    width: 240
    offset_height: 52
    offset_width: 40
    cs_pin: 5
    dc_pin: 16
    reset_pin: 23
    lambda: |-
      it.fill(Color(0, 0, 0));

      // Status Header
      it.printf(10, 10, id(font_small), Color(255, 255, 255), "BOILER STATUS");

      // Heating Indicator logic
      if (id(is_heating).state) {
        it.printf(230, 10, id(font_small), Color(255, 0, 0), TextAlign::TOP_RIGHT, "HEATING");
      } else {
        it.printf(230, 10, id(font_small), Color(0, 255, 0), TextAlign::TOP_RIGHT, "IDLE");
      }

      // Large Central Temperature
      it.printf(120, 70, id(font_huge), Color(255, 255, 255), TextAlign::CENTER, "%.0f°C", id(current_temp).state);

      // Target Temp (Bottom Left)
      it.printf(10, 128, id(font_medium), Color(180, 180, 180), TextAlign::BOTTOM_LEFT, "Set: %.0f°", id(target_temp).state);

      // Uptime (Bottom Right)
      it.print(230, 128, id(font_small), Color(120, 120, 120), TextAlign::BOTTOM_RIGHT, id(mqtt_raw_uptime).state.c_str());