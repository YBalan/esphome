substitutions:
  device_name: electrolux-boiler-lcd

esphome:
  name: ${device_name}

esp32:
  board: esp32dev
  framework:
    type: esp-idf  #arduino #esp-idf  # Arduino better supports some display functions

logger:
  level: INFO

ota:
  - platform: esphome

wifi:
  ap:
    ssid: "AP-Boiler-LCD"
    password: "password"
  fast_connect: true

captive_portal:
web_server:
  port: 80
api:

mqtt:
  broker: !secret mqtt_broker
  client_id: esp32_electrolux_boiler_lcd_client
  username: !secret mqtt_username
  password: !secret mqtt_password
  port: 1883
  topic_prefix: boiler
  discovery: true
  on_message:
    - topic: "boiler/debug" # Если у бойлера включен log_topic
      then:
        - logger.log:
            format: "Boiler Log says: %s"
            args: [ 'x.c_str()' ]

globals:
  - id: current_brightness_val
    type: float
    initial_value: '0.7'
  - id: rotation_setting
    type: int
    initial_value: '90' # Start with USB on the Left
    

button:
  # WiFi Reset Button
  - platform: factory_reset
    name: "Reset Device WiFi"
    id: reset_wifi_btn
    icon: "mdi:wifi-reset"
    # This button will automatically appear in Home Assistant 
    # and will be published to MQTT topic: boiler/button/reset_device_wifi/command
  # 2. Toggle Landscape Rotation Button (90 and 270)
  - platform: template
    name: "Toggle Landscape Rotation"
    id: toggle_rot_btn
    icon: "mdi:screen-rotation"
    on_press:
      then:
        - lambda: |-
            // Toggle logic between 90 and 270
            if (id(rotation_setting) == 90) id(rotation_setting) = 270;
            else id(rotation_setting) = 90;

            // Apply to the display
            if (id(rotation_setting) == 90) id(my_display).set_rotation(DISPLAY_ROTATION_90_DEGREES);
            else id(my_display).set_rotation(DISPLAY_ROTATION_270_DEGREES);
            
            id(my_display).update();
        - script.execute: wake_screen_script
        
number:
  - platform: template
    name: "Display Brightness"
    id: brightness_slider
    icon: "mdi:brightness-6"
    min_value: 0.1   # 10% (not 0, to keep screen visible)
    max_value: 1.0   # 100%
    step: 0.1
    mode: slider
    optimistic: true
    initial_value: 0.8
    # This will be visible in HA and controllable via MQTT
    # MQTT Topic: boiler_remote/number/display_brightness/command
    on_value:
      then:
        - globals.set:
            id: current_brightness_val
            value: !lambda "return x;"
        # Apply immediately if the screen is currently awake
        - if:
            condition:
              light.is_on: display_backlight
            then:
              - light.turn_on:
                  id: display_backlight
                  brightness: !lambda "return x;"

# --- MQTT SUBSCRIPTIONS ---
text_sensor:
  - platform: mqtt_subscribe
    id: mqtt_raw_temp
    topic: "boiler/sensor/boiler_current_temp/state"
    on_value:
      then:
       - logger.log: 
            format: "MQTT Received: %s"
            args: [ 'x.c_str()' ]
       - component.update: current_temp
       - component.update: my_display       

  - platform: mqtt_subscribe
    id: mqtt_raw_target
    topic: "boiler/sensor/boiler_target_temp/state"
    on_value:
      then:
       - logger.log: 
            format: "MQTT Received: %s"
            args: [ 'x.c_str()' ]
       - component.update: target_temp
       - component.update: my_display 

  - platform: mqtt_subscribe
    id: mqtt_raw_heating
    topic: "boiler/binary_sensor/boiler_heating/state"
    on_value:
      then:
       - logger.log: 
            format: "MQTT Received: %s"
            args: [ 'x.c_str()' ]       
       - component.update: my_display 

sensor:
  - platform: template
    id: current_temp
    unit_of_measurement: "°C"
    lambda: 'return atof(id(mqtt_raw_temp).state.c_str());'

  - platform: template
    id: target_temp
    unit_of_measurement: "°C"
    lambda: 'return atof(id(mqtt_raw_target).state.c_str());'
    
  - platform: wifi_signal
    name: "WiFi Signal Sensor"
    id: wifi_rssi
    update_interval: 30s
    state_topic: "boiler/lcd/wifi_rssi"

binary_sensor:
  - platform: template
    id: is_heating
    lambda: 'return id(mqtt_raw_heating).state == "ON";'
  # 1. Internal status sensor (ON when connected to WiFi/MQTT, OFF otherwise)
  - platform: status
    id: online_status

  # Physical buttons on T-Display
  - platform: gpio
    pin: { number: 0, inverted: true, mode: INPUT_PULLUP }
    name: "Button Left"  
    filters:
      - delayed_on: 50ms
    on_press:
      then:
        - script.execute: cycle_brightness_script
        - script.execute: wake_screen_script    

  - platform: gpio
    pin: { number: 35, inverted: true }
    name: "Button Right"
    on_press:
      then:
        - script.execute: wake_screen_script

# 2. Logic to keep backlight ON during AP mode
interval:
  - interval: 5s
    then:
      - lambda: |-
          if (!id(online_status).state) {
            // Force backlight ON if not connected
            auto call = id(display_backlight).make_call();
            call.set_brightness(id(current_brightness_val));
            call.set_state(true);
            call.perform();
          }    

# --- DISPLAY CONFIG ---
spi:
  clk_pin: 18
  mosi_pin: 19

font:
  - file: "gfonts://Roboto"
    id: font_small
    size: 14
  - file: "gfonts://Roboto"
    id: font_medium
    size: 22
  - file: "gfonts://Roboto"
    id: font_huge
    size: 90

color:
  - id: white
    red: 100%
    green: 100%
    blue: 100%
  - id: black
    red: 0%
    green: 0%
    blue: 0%
  - id: red
    red: 100%
    green: 0%
    blue: 0%
  - id: green
    red: 0%
    green: 100%
    blue: 0%
  - id: blue
    red: 0%
    green: 50%
    blue: 100%
  - id: yellow
    red: 100%
    green: 80%
    blue: 0%

display:
  - platform: st7789v
    id: my_display
    model: TTGO_TDISPLAY_135X240
    # Назначаем "подсветку" на пустой пин, чтобы освободить GPIO4
    backlight_pin: GPIO33 
    rotation: 90
    cs_pin: 5
    dc_pin: 16
    reset_pin: 23
    update_interval: 10s
    lambda: |-          

      // --- CHECK IF ONLINE ---
      if (!id(online_status).state) {
        int w = it.get_width();
        int h = it.get_height();
        int cx = w / 2;
        // DRAW SETUP SCREEN (AP MODE)
        it.fill(id(black));
        it.rectangle(0, 0, w, h, id(blue));
        it.printf(cx, 20, id(font_medium), id(white), TextAlign::CENTER, "WIFI SETUP MODE");
        
        it.printf(cx, 55, id(font_small), id(white), TextAlign::CENTER, "Connect to Wi-Fi:");
        it.printf(cx, 75, id(font_medium), id(yellow), TextAlign::CENTER, "AP-Boiler-LCD");
        
        //it.printf(cx, 105, id(font_small), id(white), TextAlign::CENTER, "Open browser at:");
        //it.printf(cx, 120, id(font_small), id(white), TextAlign::CENTER, "192.168.4.1");
        return; // Important: stop drawing boiler UI
      }
      
      it.fill(black);

      // --- DRAW GAUGE MANUALLY ---
      int cx = 120; // Center X
      int cy = 130; // Center Y (shifted down)
      int r = 100;  // Radius
      
      int thickness = 10; // ТОЛЩИНА ЛИНИИ в пикселях

      // Функция для рисования ЖИРНОЙ дуги
      auto draw_thick_arc = [&](int start_angle, int end_angle, Color color) {
        for (int t = 0; t < thickness; t++) {
          int current_r = r - t;
          for (int a = start_angle; a < end_angle; a++) {
            float rad1 = a * M_PI / 180.0;
            float rad2 = (a + 1) * M_PI / 180.0;
            it.line(cx + current_r * cos(rad1), cy + current_r * sin(rad1), 
                    cx + current_r * cos(rad2), cy + current_r * sin(rad2), color);
          }
        }
      };
      
      // Helper function for drawing arcs using lines
      auto draw_arc = [&](int start_angle, int end_angle, Color color) {
        for (int a = start_angle; a < end_angle; a++) {
          float rad1 = a * M_PI / 180.0;
          float rad2 = (a + 1) * M_PI / 180.0;
          it.line(cx + r * cos(rad1), cy + r * sin(rad1), 
                  cx + r * cos(rad2), cy + r * sin(rad2), color);
          // Draw a second line for thickness
          it.line(cx + (r-1) * cos(rad1), cy + (r-1) * sin(rad1), 
                  cx + (r-1) * cos(rad2), cy + (r-1) * sin(rad2), color);
        }
      };

      // Draw Segments: Blue (Cold), Green (OK), Yellow (Hot), Red (Danger)
      draw_thick_arc(180, 225, blue);
      draw_thick_arc(225, 315, green);
      draw_thick_arc(315, 345, yellow);
      draw_thick_arc(345, 360, red);

      // --- DRAW NEEDLE ---
      float temp = id(current_temp).state;
      if (std::isnan(temp) || temp < 30) temp = 30;
      if (temp > 75) temp = 75;
      
      // Map 30..75 C to 180..360 degrees
      float angle = 180.0 + (temp - 30.0) * (180.0 / 45.0);
      float rad = angle * M_PI / 180.0;
      
      int px = cx + (r) * cos(rad);
      int py = cy + (r) * sin(rad);
      
      // Draw needle line and head
      //it.line(cx, cy - 25, px, py, white);
      it.filled_circle(px, py, 6, white);

      // --- DISPLAY DATA TEXT ---
      // Big Central Temperature
      if (id(current_temp).has_state()) {
        it.printf(cx, 85, id(font_huge), white, TextAlign::CENTER, "%.0f°", id(current_temp).state);
      }
      
      //it.printf(0, 0, id(font_small), white, "Raw: %s", id(mqtt_raw_temp).state.c_str());

      // Status Labels
      //it.print(10, 5, id(font_small), white, "BOILER");
      it.printf(10, 5, id(font_medium), Color(200,200,200), "%.0f°", id(target_temp).state);
      
      if (id(is_heating).state) {
        it.print(230, 5, id(font_small), red, TextAlign::TOP_RIGHT, "HEATING");
      } else {
        it.print(230, 5, id(font_small), green, TextAlign::TOP_RIGHT, "STANDBY");
      }

      // Bottom Info: 
      it.printf(10, 118, id(font_small), Color(200,200,200), "%.0f dBm", id(wifi_rssi).state);
      
      //if (id(mqtt_raw_uptime).has_state()) {
        //it.print(230, 120, id(font_small), Color(150,150,150), TextAlign::BOTTOM_RIGHT, id(mqtt_raw_uptime).state.c_str());
      //}

# 1. ОСВОБОЖДАЕМ ПИН 4 ДЛЯ ЯРКОСТИ
output:
  - platform: ledc
    pin: GPIO4
    id: backlight_pwm

light:
  - platform: monochromatic
    output: backlight_pwm
    name: "Display Switch"
    id: display_backlight
    #internal: true
    restore_mode: ALWAYS_ON

# 5. КНОПКИ И СКРИПТ (Автовыключение)
script:
  - id: cycle_brightness_script
    mode: single
    then:
      - lambda: |-
          // Cycle brightness value
          id(current_brightness_val) += 0.33;
          if (id(current_brightness_val) > 1.0) id(current_brightness_val) = 0.33;
          
          // SYNC the slider in Home Assistant
          auto call = id(brightness_slider).make_call();
          call.set_value(id(current_brightness_val));
          call.perform();
  - id: wake_screen_script
    mode: restart
    then:
      - light.turn_on:
          id: display_backlight
          brightness: !lambda "return id(current_brightness_val);"
      - delay: 60s
      - light.turn_off: display_backlight