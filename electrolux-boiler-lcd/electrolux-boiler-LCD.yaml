substitutions:
  device_name: electrolux-boiler-lcd
  screen_timeout: "60s"

esphome:
  name: ${device_name}
  includes:
    - electrolux-boiler-lcd-defines.h
    - electrolux-boiler-lcd.h
  on_boot:
    - priority: 800
      then:
        - logger.log: "ON_BOOT IS WORKING"  
        - script.execute: wake_screen_script      

esp32:
  board: esp32dev
  framework:
    type: esp-idf

logger:
  level: INFO  

ota:
  - platform: esphome

wifi:
  ap:
    ssid: "AP-Boiler-LCD"
    password: "password"
  fast_connect: true

captive_portal:
web_server:
  port: 80
api:

mqtt:
  broker: !secret mqtt_broker  
  username: !secret mqtt_username
  password: !secret mqtt_password
  port: 1883
  topic_prefix: boiler/lcd
  discovery: true
  on_message:
    - topic: "boiler/debug" # If the boiler has log_topic enabled
      then:
        - logger.log:
            format: "Boiler Log says: %s"
            args: [ 'x.c_str()' ]

globals:
  - id: current_brightness_val
    type: float    
    initial_value: '0.7'
    restore_value: true
  - id: rotation_setting
    type: int
    initial_value: '90' # Start with USB on the Left    
    restore_value: true

button:
  # WiFi Reset Button
  - platform: factory_reset
    name: "Reset Device WiFi"
    id: reset_wifi_btn
    icon: "mdi:wifi-reset"
  # Toggle Landscape Rotation Button — disabled (display off)
  - platform: template
    name: "Toggle Landscape Rotation"
    id: toggle_rot_btn
    icon: "mdi:screen-rotation"
    on_press:
      then:
        - lambda: 'lcd_toggle_rotation();'
        - script.execute: wake_screen_script
        - logger.log: "Rotation toggled"

number:
  - platform: template
    name: "Display Brightness"
    id: brightness_slider
    icon: "mdi:brightness-6"
    min_value: 0.1
    max_value: 1.0
    step: 0.1
    mode: slider
    optimistic: true
    restore_value: true
    initial_value: 0.7
    on_value:
      then:
        - globals.set:
            id: current_brightness_val
            value: !lambda "return x;"
        - if:
            condition:
              light.is_on: display_backlight
            then:
              - light.turn_on:
                  id: display_backlight
                  brightness: !lambda "return x;"
        #- script.execute: wake_screen_script
        - logger.log:
            format: "Brightness set to: %.1f"
            args: [ 'x' ]

# --- MQTT SUBSCRIPTIONS ---
text_sensor:
  - platform: mqtt_subscribe
    id: mqtt_raw_temp
    topic: "boiler/sensor/boiler_current_temp/state"
    on_value:
      then:
       - logger.log: 
            format: "MQTT Received: %s"
            args: [ 'x.c_str()' ]
       - component.update: current_temp
       - component.update: my_display

  - platform: mqtt_subscribe
    id: mqtt_raw_target
    topic: "boiler/sensor/boiler_target_temp/state"
    on_value:
      then:
       - logger.log: 
            format: "MQTT Received: %s"
            args: [ 'x.c_str()' ]
       - component.update: target_temp
       - component.update: my_display

  - platform: mqtt_subscribe
    id: mqtt_raw_heating
    topic: "boiler/binary_sensor/boiler_heating/state"
    on_value:
      then:
       - logger.log: 
            format: "MQTT Received: %s"
            args: [ 'x.c_str()' ]   
       - component.update: my_display

  - platform: mqtt_subscribe
    id: mqtt_raw_mode
    topic: "boiler/sensor/boiler_power_mode/state"
    on_value:
      then:
       - logger.log:
            format: "MQTT Mode Received: %s"
            args: [ 'x.c_str()' ]
       - component.update: my_display

  - platform: mqtt_subscribe
    id: mqtt_raw_bst
    topic: "boiler/binary_sensor/boiler_bst_mode/state"
    on_value:
      then:
       - logger.log:
            format: "MQTT BST Received: %s"
            args: [ 'x.c_str()' ]
       - component.update: my_display

  - platform: mqtt_subscribe
    id: mqtt_raw_trend
    topic: "boiler/sensor/boiler_temp_trend/state"
    on_value:
      then:
       - logger.log:
            format: "MQTT Trend Received: %s"
            args: [ 'x.c_str()' ]
       - component.update: my_display

sensor:
  - platform: template
    id: current_temp
    unit_of_measurement: "°C"
    lambda: 'return atof(id(mqtt_raw_temp).state.c_str());'

  - platform: template
    id: target_temp
    unit_of_measurement: "°C"
    lambda: 'return atof(id(mqtt_raw_target).state.c_str());'
    
  - platform: wifi_signal
    name: "WiFi Signal Sensor"
    id: wifi_rssi
    update_interval: 30s
    state_topic: "boiler/lcd/wifi_rssi"

binary_sensor:
  - platform: template
    id: is_heating
    lambda: 'return id(mqtt_raw_heating).state == "ON";'
  - platform: template
    id: is_bst
    lambda: 'return id(mqtt_raw_bst).state == "ON";'
  - platform: status
    id: online_status

  - platform: gpio
    pin: { number: 0, inverted: true, mode: INPUT_PULLUP }
    name: "Button Left"
    filters:
      - delayed_on: 50ms
    on_press:
      then:
        - script.execute: cycle_brightness_script
        - script.execute: wake_screen_script
        - logger.log: "Button Left pressed"

  - platform: gpio
    pin: { number: 35, inverted: true }
    name: "Button Right"
    on_press:
      then:
        - script.execute: wake_screen_script
        - logger.log: "Button Right pressed"

#interval — disabled (display off)
interval:
  - interval: 5s
    then:
      - lambda: 'lcd_ensure_backlight_ap_mode();'

font:
  - file: "gfonts://Roboto"
    id: font_small
    size: 14
  - file: "gfonts://Roboto"
    id: font_medium
    size: 22
  - file: "gfonts://Roboto"
    id: font_huge
    size: 90

color:
  - id: white
    red: 100%
    green: 100%
    blue: 100%
  - id: black
    red: 0%
    green: 0%
    blue: 0%
  - id: red
    red: 100%
    green: 0%
    blue: 0%
  - id: green
    red: 0%
    green: 100%
    blue: 0%
  - id: blue
    red: 0%
    green: 50%
    blue: 100%
  - id: yellow
    red: 100%
    green: 80%
    blue: 0%

#--- DISPLAY CONFIG
spi:
  clk_pin: 18
  mosi_pin: 19

display:
  - platform: st7789v
    id: my_display
    model: TTGO_TDISPLAY_135X240
    backlight_pin: GPIO33
    rotation: 90
    cs_pin: 5
    dc_pin: 16
    reset_pin: 23
    update_interval: 60s
    lambda: 'lcd_draw_screen(it);'

output:
  - platform: ledc
    pin: GPIO4
    id: backlight_pwm

light:
  - platform: monochromatic
    output: backlight_pwm
    name: "Display Switch"
    id: display_backlight
    restore_mode: RESTORE_AND_OFF    
    on_state:
      then:
        - logger.log: "Display backlight turned"            

script:
  - id: cycle_brightness_script
    mode: single
    then:
      - lambda: 'lcd_cycle_brightness();'
  - id: wake_screen_script
    mode: restart
    then:
      - light.turn_on:
          id: display_backlight
          brightness: !lambda "return id(current_brightness_val);"
      - delay: ${screen_timeout}
      - light.turn_off: display_backlight
      - logger.log: "Wake screen script executed"