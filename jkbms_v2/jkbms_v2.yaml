substitutions:
  # Device name
  device_name: jkbms-gateway-v2
  
  # Hardware
  bms_mac_address: "C8:47:80:28:71:3E"
  relay_control_pin: "14"
  
  # Timings
  display_on_time: "30s"
  bms_update_interval: "5s"
  
  # relay limits
  total_capacity: "314.0"
  soc_low_limit: "200.0"
  soc_high_limit: "300.0"

esphome:
  name: ${device_name}
  # Start the timer when the system boots
  on_boot:
    priority: -100 # Run last, when everything has already finished loading
    then:
      - script.execute: display_timer

esp32:
  board: esp32dev
  framework:
    type: esp-idf

# 1. Connection settings
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  # Fallback access point if WiFi disappears
  ap:
    ssid: "JKBMS-Gateway-Hotspot"  

# MQTT configuration (fill in your broker details)
mqtt:    
  broker: !secret mqtt_broker
  username: !secret mqtt_username
  password: !secret mqtt_password  
  port: 1883
  topic_prefix: jkbms
  #level: NONE
  #reboot_timeout: 0s
  #keepalive: 60s
  # If you use HiveMQ Cloud (port 8883), add: certificate_authority: ...

# Enable logger
logger:
  level: INFO

# 2. Bluetooth settings
esp32_ble_tracker:
  scan_parameters:
    active: true

ble_client:
  - mac_address: ${bms_mac_address}
    id: jkbms_ble

# 3. JK-BMS driver integration
external_components:
  - source: github://syssi/esphome-jk-bms@main

jk_bms_ble:
  - ble_client_id: jkbms_ble
    id: my_bms
    update_interval: ${bms_update_interval} 
    protocol_version: JK02_32S

# 4. SENSORS (Telemetry)
sensor:
  - platform: jk_bms_ble
    jk_bms_ble_id: my_bms

    # Total voltage: publish if it changed by 0.05V, but not more often than once every 2 seconds
    total_voltage:
      name: "BMS Total Voltage"
      state_topic: "jkbms/voltage"
      id: bms_v
      filters:
        - delta: 0.05
        - throttle: 2s

    # Current: publish if it changed by 0.1A
    current:
      name: "BMS Current"
      state_topic: "jkbms/current"
      id: bms_a
      filters:
        - delta: 0.1
        - throttle: 2s

    # Charge in Ah: publish only if it changed by 0.01 or once every 2 seconds
    capacity_remaining:
      name: "BMS SoC"
      state_topic: "jkbms/soc"
      id: bms_ah
      on_value:
        then:
          # If the capacity dropped below ${soc_low_limit} Ah
          - if:
              condition:
                lambda: 'return x < ${soc_low_limit};'
              then:
                - switch.turn_on: bms_relay                
          # If the capacity rose to ${soc_high_limit} Ah and above
          - if:
              condition:
                lambda: 'return x >= ${soc_high_limit};'
              then:
                - switch.turn_off: bms_relay                
      filters:
        - delta: 0.01
        - throttle: 2s

    # Power (W)
    power:
      name: "BMS Power"
      state_topic: "jkbms/power"
      filters:
        - delta: 5.0
        - throttle: 2s

    # Temperatures: publish if they changed by 0.5 degrees or once per minute
    temperature_sensor_1:
      name: "BMS Temp 1"
      state_topic: "jkbms/t1"
      filters: &temp_filter
        - delta: 0.5
        - throttle: 15s
    temperature_sensor_2:
      name: "BMS Temp 2"
      state_topic: "jkbms/t2"
      filters: *temp_filter    

    # Cells: the most important part. Publish if it changed by 0.01V
    min_cell_voltage:
      name: "Min Cell"
      state_topic: "jkbms/min_c_v"
      filters:
        - delta: 0.01
        - throttle: 5s
        
    max_cell_voltage:
      name: "Max Cell"
      state_topic: "jkbms/max_c_v"
      filters:
        - delta: 0.01
        - throttle: 5s

    # Imbalance (Delta)
    delta_cell_voltage:
      name: "BMS Cell Delta"
      state_topic: "jkbms/delta"
      filters:
        - delta: 0.002
        - throttle: 5s
        
    # Wi-Fi signal level
  - platform: wifi_signal
    name: "WiFi Signal RSSI"
    id: wifi_rssi
    update_interval: 15s
    state_topic: "jkbms/wifi_rssi"
    force_update: true

  # Bluetooth (BLE) signal level from the BMS
  - platform: ble_rssi
    mac_address: ${bms_mac_address}
    name: "BMS BLE RSSI"
    id: ble_rssi_val    
    state_topic: "jkbms/ble_rssi"
    force_update: true
    filters:
      - throttle: 15s # Skip values more often than once every 15 seconds
      
  - platform: template
    name: "Charging Time Remaining"
    id: charging_time
    unit_of_measurement: "h"
    state_topic: "jkbms/charging_time_hours"
    accuracy_decimals: 1
    update_interval: 10s # No need to calculate too often
    lambda: |-
      float current = id(bms_a).state;
      float total_cap = ${total_capacity};
      float remaining_cap = id(bms_ah).state;
      
      // If the charge current is greater than 0.1 A (charging is in progress)
      if (current > 0.1) {
        float need_ah = total_cap - remaining_cap;
        if (need_ah <= 0) return 0; // Already charged
        return need_ah / current;   // Hours = capacity / current
      } else {
        return 0; // Not charging
      }
      
# 5. STATUSES (Binary Sensors)
binary_sensor:
  - platform: jk_bms_ble
    jk_bms_ble_id: my_bms
    charging:
      name: "BMS Charging State"
      state_topic: "jkbms/status/charging"
    discharging:
      name: "BMS Discharging State"
      state_topic: "jkbms/status/discharging"
    balancing:
      name: "BMS Balancing State"
      state_topic: "jkbms/status/balancing"
      
    # GPIO button 0 (Buiktin button "Boot" to wake dislay)
  - platform: gpio
    pin:
      number: 0
      inverted: true
      mode: INPUT_PULLUP
    id: wake_button
    on_press:
      - script.execute: display_timer

# 6. CONTROL (Switches)
# Allow turning charge/discharge on/off via MQTT
switch:
# Power relay on pin ${relay_control_pin}
  - platform: gpio
    pin: ${relay_control_pin}
    name: "BMS Control Relay"
    id: bms_relay
    restore_mode: ALWAYS_OFF # On boot the relay is always off
      # MQTT settings:
    state_topic: "jkbms/relay/state"      # The phone will see the status here
    command_topic: "jkbms/relay/set"    # The phone will send ON/OFF here    
    # Tie the blue LED to the relay state
    on_turn_on:
      - output.turn_on: blue_led_out
    on_turn_off:
      - output.turn_off: blue_led_out
    
  # JKBMS Switches
  - platform: jk_bms_ble
    jk_bms_ble_id: my_bms
    charging:
      name: "BMS Charging Switch"
      state_topic: "jkbms/switch/charge/state"
      command_topic: "jkbms/switch/charge/set"
    discharging:
      name: "BMS Discharging Switch"
      state_topic: "jkbms/switch/discharge/state"
      command_topic: "jkbms/switch/discharge/set"
    balancer:
      name: "BMS Balancer Switch"
      state_topic: "jkbms/switch/balance/state"
      command_topic: "jkbms/switch/balance/set"
      
# Describe the LED as a simple output, so we don't create extra buttons in MQTT
output:
  - platform: gpio
    pin: 2
    id: blue_led_out

# 7. DIAGNOSTICS
text_sensor:
  - platform: jk_bms_ble
    jk_bms_ble_id: my_bms
    errors:
      name: "BMS Errors"
      state_topic: "jkbms/errors"
  # Charging Time
  - platform: template
    name: "Charging Time Formatted"
    state_topic: "jkbms/charging_time_human"
    update_interval: 10s
    lambda: |-
      float hours_raw = id(charging_time).state;
      if (hours_raw <= 0) {
        return {"NA"};
      }
      
      int total_minutes = (int)(hours_raw * 60);
      int h = total_minutes / 60;
      int m = total_minutes % 60;
      
      char buf[20];
      sprintf(buf, "%dh %dm", h, m);
      return {buf};
      
# 1. Timer script (controls how long it stays lit)
script:
  - id: display_timer
    mode: restart # If you press the button again, the timer resets to the beginning
    then:
      - lambda: 'id(my_display).turn_on();'
      - delay: 30s # How long the screen will stay on
      - lambda: 'id(my_display).turn_off();'

font:
  - file: "gfonts://Roboto"
    id: font_small
    size: 12
  - file: "gfonts://Roboto"
    id: font_medium
    size: 16
  - file: "gfonts://Roboto"
    id: font_large
    size: 22

i2c:
  sda: 21
  scl: 22
  scan: true # Enable the scanner; it will show the address in the logs

# 3. Display block improvement (add ID)
display:
  - platform: ssd1306_i2c
    id: my_display
    model: "SSD1306 128x64"
    address: 0x3C
    # The screen will be off on boot until the first button press
    setup_priority: -100 
    lambda: |-
      // The same drawing code as we wrote above
      it.printf(0, 0, id(font_small), "JK-BMS MONITOR");
      it.line(0, 13, 128, 13);
      if (id(bms_v).has_state()) {
        it.printf(0, 15, id(font_large), "%.2f V", id(bms_v).state);
      }
      if (id(bms_a).has_state()) {
        it.printf(0, 38, id(font_small), "Current: %.2f A", id(bms_a).state);
      }
      if (id(bms_ah).has_state()) {
        it.printf(0, 50, id(font_small), "Cap: %.1f Ah", id(bms_ah).state);
      }